<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#2D6CDF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Absensi">
  <title>Sistem Absensi Digital</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Favicon untuk tab browser -->
  <link rel="icon" type="image/png" sizes="96x96"  href="/icons/icon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="shortcut icon" href="/icons/icon-96.png">

  <!-- Apple Touch Icon (iOS home screen) -->
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">

  <!-- ⚡ EARLY BRANDING CACHE — harus dijalankan SEBELUM CSS supaya tidak ada kedipan warna default -->
  <script>
  (function() {
    try {
      var c = JSON.parse(localStorage.getItem('_brand') || 'null');
      if (!c) return;
      // Expire cache 7 hari
      if (c._ts && (Date.now() - c._ts) > 7*24*60*60*1000) {
        localStorage.removeItem('_brand');
        return;
      }
      var r = document.documentElement;
      if (c.warna_primer)   r.style.setProperty('--color-primer', c.warna_primer);
      if (c.warna_sekunder) r.style.setProperty('--color-sekunder', c.warna_sekunder);
      var mt = document.querySelector('meta[name="theme-color"]');
      if (mt && c.warna_primer) mt.setAttribute('content', c.warna_primer);
      if (c.nama_instansi) document.title = c.nama_instansi + ' — Absensi';
      // Expose ke script lain (branding.js & app.js) supaya tidak perlu re-parse
      window.__brandCache = c;
    } catch(e) {}
  })();
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/ranking.css">
  <link rel="stylesheet" href="/css/mobile.css">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- PDF Library (jsPDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Excel Library (SheetJS) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Signature Pad untuk TTD -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>

  <style>
    /* Keyframes yang dipakai di JS */
    @keyframes fadeInScale {
      from { opacity:0; transform:scale(.92); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to   { transform:translateY(0); }
    }
    @keyframes spin {
      to { transform:rotate(360deg); }
    }
    @keyframes confettiFall {
      from { transform:translateY(-20px) rotate(0); opacity:1; }
      to   { transform:translateY(100vh) rotate(720deg); opacity:0; }
    }
    @keyframes bootFadeOut {
      to { opacity:0; visibility:hidden; }
    }

    /* ⚡ BOOT LOADER — logo + nama instansi muter mengelilingi logo */
    #boot-loader {
      position:fixed; inset:0; z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:20px;
      background:linear-gradient(135deg, var(--color-primer, #2D6CDF) 0%, var(--color-sekunder, #1A9E74) 100%);
      transition:opacity .35s ease;
    }
    #boot-loader.hide { animation:bootFadeOut .35s ease forwards; }
    .brand-loader-wrap {
      position:relative; width:220px; height:220px;
      display:flex; align-items:center; justify-content:center;
    }
    .brand-loader-ring {
      position:absolute; inset:0;
      animation:spin 8s linear infinite;
    }
    .brand-loader-logo {
      width:100px; height:100px;
      border-radius:22px;
      background:rgba(255,255,255,0.97);
      box-shadow:0 10px 30px rgba(0,0,0,0.18);
      display:flex; align-items:center; justify-content:center;
      font-size:46px; overflow:hidden;
      position:relative; z-index:2;
    }
    .brand-loader-logo img {
      width:100%; height:100%; object-fit:contain; padding:10px;
    }
    .brand-loader-hint {
      color:rgba(255,255,255,0.85);
      font-size:12px; letter-spacing:2px; font-weight:500;
      text-transform:uppercase;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Loading awal: logo + nama instansi muter mengelilingi logo -->
    <div id="boot-loader">
      <div class="brand-loader-wrap">
        <svg class="brand-loader-ring" viewBox="0 0 220 220" width="220" height="220" aria-hidden="true">
          <defs>
            <path id="bootCirclePath" d="M 110,110 m -92,0 a 92,92 0 1,1 184,0 a 92,92 0 1,1 -184,0"/>
          </defs>
          <text fill="rgba(255,255,255,0.95)" font-size="13" font-weight="600" letter-spacing="3" font-family="Inter, system-ui, sans-serif">
            <textPath id="boot-textpath" href="#bootCirclePath" startOffset="0">
              Memuat • Memuat • Memuat • Memuat • Memuat • Memuat •
            </textPath>
          </text>
        </svg>
        <div class="brand-loader-logo" id="boot-logo-inner">
          <span id="boot-logo-emoji">📋</span>
        </div>
      </div>
      <div class="brand-loader-hint">Mohon tunggu</div>
    </div>
  </div>
  <!-- Inline: isi loader dari cache branding -->
  <script>
  (function(){
    try {
      var c = window.__brandCache;
      if (!c) return;
      // Logo
      if (c.logo_url) {
        var inner = document.getElementById('boot-logo-inner');
        if (inner) {
          inner.innerHTML = '<img src="'+c.logo_url+'" alt="" onerror="this.parentNode.innerHTML=\'<span style=&quot;font-size:46px&quot;>📋</span>\'">';
        }
      }
      // Nama instansi muter mengelilingi logo
      if (c.nama_instansi) {
        var tp = document.getElementById('boot-textpath');
        if (tp) {
          var nm = c.nama_instansi.trim();
          // Repeat cukup banyak supaya lingkaran penuh walau nama pendek
          var repeats = Math.max(2, Math.ceil(60 / (nm.length + 3)));
          tp.textContent = (nm + ' • ').repeat(repeats);
        }
      }
    } catch(e) {}
  })();
  </script>

  <!-- JS — urutan penting, tidak boleh ditukar -->

  <script src="/js/admin_pages.js?v=202604191200"></script>
  <script src="/js/app.js?v=202604201200"></script>
</body>
</html>
