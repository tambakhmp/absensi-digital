<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#2D6CDF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Absensi">
  <title>Sistem Absensi Digital</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Favicon untuk tab browser -->
  <link rel="icon" type="image/png" sizes="96x96"  href="/icons/icon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="shortcut icon" href="/icons/icon-96.png">

  <!-- Apple Touch Icon (iOS home screen) -->
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">

  <!-- ⚡ EARLY BRANDING CACHE — harus dijalankan SEBELUM CSS supaya tidak ada kedipan warna default -->
  <script>
  (function() {
    try {
      var c = JSON.parse(localStorage.getItem('_brand') || 'null');
      if (!c) return;
      // Expire cache 7 hari
      if (c._ts && (Date.now() - c._ts) > 7*24*60*60*1000) {
        localStorage.removeItem('_brand');
        return;
      }
      var r = document.documentElement;
      if (c.warna_primer)   r.style.setProperty('--color-primer', c.warna_primer);
      if (c.warna_sekunder) r.style.setProperty('--color-sekunder', c.warna_sekunder);
      var mt = document.querySelector('meta[name="theme-color"]');
      if (mt && c.warna_primer) mt.setAttribute('content', c.warna_primer);
      if (c.nama_instansi) document.title = c.nama_instansi + ' — Absensi';
      // Expose ke script lain (branding.js & app.js) supaya tidak perlu re-parse
      window.__brandCache = c;
    } catch(e) {}
  })();
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/ranking.css">
  <link rel="stylesheet" href="/css/mobile.css">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- PDF Library (jsPDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Excel Library (SheetJS) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Signature Pad untuk TTD -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>

  <style>
    /* Keyframes yang dipakai di JS */
    @keyframes fadeInScale {
      from { opacity:0; transform:scale(.92); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to   { transform:translateY(0); }
    }
    @keyframes spin {
      to { transform:rotate(360deg); }
    }
    @keyframes confettiFall {
      from { transform:translateY(-20px) rotate(0); opacity:1; }
      to   { transform:translateY(100vh) rotate(720deg); opacity:0; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Loading awal — pakai CSS variables supaya ikut warna cached branding -->
    <div id="boot-loader" style="height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:16px;background:#F8FAFC">
      <div id="boot-logo" style="width:60px;height:60px;border-radius:14px;
        background:linear-gradient(135deg,var(--color-primer,#2D6CDF),var(--color-sekunder,#1A9E74));
        display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;overflow:hidden">📋</div>
      <div id="boot-text" style="font-size:15px;font-weight:600;color:#1E293B">Sistem Absensi Digital</div>
      <div style="width:40px;height:40px;border:3px solid #E2E8F0;
        border-top-color:var(--color-primer,#2D6CDF);
        border-radius:50%;animation:spin .8s linear infinite"></div>
    </div>
  </div>
  <!-- Inline: pakai cache utk logo/nama di loader -->
  <script>
  (function(){
    try {
      var c = window.__brandCache;
      if (!c) return;
      if (c.logo_url) {
        var bl = document.getElementById('boot-logo');
        if (bl) {
          bl.innerHTML = '<img src="'+c.logo_url+'" alt="" style="max-width:60px;max-height:60px;object-fit:contain" onerror="this.parentNode.innerHTML=\'📋\'">';
          bl.style.background = 'transparent';
        }
      }
      if (c.nama_instansi) {
        var bt = document.getElementById('boot-text');
        if (bt) bt.textContent = c.nama_instansi;
      }
    } catch(e) {}
  })();
  </script>

  <!-- JS — urutan penting, tidak boleh ditukar -->
  <script src="/js/api.js?v=202604191200"></script>
  <script src="/js/auth.js?v=202604191200"></script>
  <script src="/js/utils.js?v=202604191200"></script>
  <script src="/js/branding.js?v=202604191200"></script>
  <script src="/js/ranking.js?v=202604191200"></script>
  <script src="/js/dashboard.js?v=202604191200"></script>
  <script src="/js/absensi.js?v=202604191200"></script>
  <script src="/js/pengajuan.js?v=202604191200"></script>
  <script src="/js/profil.js?v=202604191200"></script>
  <script src="/js/laporan.js?v=202604191200"></script>
  <script src="/js/admin_karyawan.js?v=202604191200"></script>
  <script src="/js/cuti_khusus.js"></script>
  <script src="/js/admin_pages.js?v=202604191200"></script>
  <script src="/js/app.js?v=202604201200"></script>
</body>
</html>
