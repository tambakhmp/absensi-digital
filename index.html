<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#2D6CDF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Absensi">
  <title>Sistem Absensi Digital</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/ranking.css">
  <link rel="stylesheet" href="/css/mobile.css">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- Signature Pad untuk TTD -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>

  <style>
    /* Keyframes yang dipakai di JS */
    @keyframes fadeInScale {
      from { opacity:0; transform:scale(.92); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to   { transform:translateY(0); }
    }
    @keyframes spin {
      to { transform:rotate(360deg); }
    }
    @keyframes confettiFall {
      from { transform:translateY(-20px) rotate(0); opacity:1; }
      to   { transform:translateY(100vh) rotate(720deg); opacity:0; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Loading awal -->
    <div style="height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:16px;background:#F8FAFC">
      <div style="width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,#2D6CDF,#1A9E74);
        display:flex;align-items:center;justify-content:center;font-size:28px">📋</div>
      <div style="font-size:15px;font-weight:600;color:#1E293B">Sistem Absensi Digital</div>
      <div style="width:40px;height:40px;border:3px solid #E2E8F0;border-top-color:#2D6CDF;
        border-radius:50%;animation:spin .8s linear infinite"></div>
    </div>
  </div>

  <!-- JS — urutan penting, tidak boleh ditukar -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/branding.js"></script>
  <script src="/js/ranking.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/absensi.js"></script>
  <script src="/js/pengajuan.js"></script>
  <script src="/js/profil.js"></script>
  <script src="/js/laporan.js"></script>
  <script src="/js/admin_karyawan.js"></script>
  <script src="/js/admin_pages.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
