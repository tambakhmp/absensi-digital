<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Sistem Absensi Digital — GPS, Foto Selfie, PWA">

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#2D6CDF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Absensi">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">

  <title>Sistem Absensi Digital</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/ranking.css">
  <link rel="stylesheet" href="/css/mobile.css">

  <!-- External Libraries (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js" defer></script>

  <style>
    /* ─── Animasi CSS inline (agar tidak perlu file ekstra) ── */
    @keyframes spin          { to { transform: rotate(360deg); } }
    @keyframes slideUp       { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeInScale   { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes confettiFall  { 0%{transform:translateY(-10px) rotate(0)} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
    @keyframes shimmerAnim   { to { background-position: -200% 0; } }
    @keyframes toastBar      { from{width:100%} to{width:0%} }

    .spinner {
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Global smooth scrolling */
    * { scroll-behavior: smooth; }

    /* Prevent body scroll saat modal terbuka */
    body.modal-open { overflow: hidden; }
  </style>
</head>
<body>
  <!-- ROOT APP — JS akan render di sini -->
  <div id="app">
    <!-- Splash Screen -->
    <div id="splash" style="min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:#2D6CDF;gap:16px">
      <div style="width:80px;height:80px;border-radius:20px;background:rgba(255,255,255,.15);
        display:flex;align-items:center;justify-content:center;font-size:40px">📋</div>
      <div style="color:#fff;font-size:20px;font-weight:700">Absensi Digital</div>
      <div style="color:rgba(255,255,255,.7);font-size:14px">Memuat aplikasi...</div>
      <div class="spinner" style="width:36px;height:36px;border:3px solid rgba(255,255,255,.3);
        border-top-color:#fff"></div>
    </div>
  </div>

  <!-- External: jsPDF + SheetJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>

  <!-- JS Modules (urutan penting!) -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/branding.js"></script>
  <script src="/js/ranking.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/absensi.js"></script>
  <script src="/js/absensi_v4.js"></script>
  <script src="/js/pengajuan.js"></script>
  <script src="/js/profil.js"></script>
  <script src="/js/laporan.js"></script>
  <script src="/js/admin_karyawan.js"></script>
  <script src="/js/absensi.js"></script>
  <script src="/js/absensi_v4.js"></script>
  <script src="/js/admin_pages.js"></script>
  <script src="/js/admin_pages_v3.js"></script>
  <script src="/js/admin_final.js"></script>
  <script src="/js/admin_sesi4.js"></script>
  <script src="/js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW:', reg.scope))
          .catch(err => console.warn('SW Error:', err));
      });
    }

    // Sembunyikan splash setelah app siap (max 1.5 detik)
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash && splash.parentNode === document.getElementById('app')) {
          // Splash sudah di-replace oleh app.js jika cepat
        }
      }, 300);
    });
  </script>
</body>
</html>
